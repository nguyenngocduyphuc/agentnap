name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unit self-checks
        run: python3 test_agentnap.py
      - name: E2E orphan-reap experiment
        run: python3 evidence/experiment_orphan_reap.py
